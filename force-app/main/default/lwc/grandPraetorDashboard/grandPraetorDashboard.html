<template>
    <div class="gp-dashboard">

        <!-- Header -->
        <div class="dashboard-header">
            <div class="dashboard-header-left">
                <template if:true={gpInfo.gpName}>
                    <div class="header-contact-item">
                        <span class="header-contact-label">Grand Praetor</span>
                        <a onclick={handleContactClick} data-contactid={gpInfo.gpContactId} class="header-contact-link">{gpInfo.gpName}</a>
                        <template if:true={gpInfo.gpEmailLink}>
                            <a href={gpInfo.gpEmailLink} class="header-contact-email" title={gpInfo.gpEmail}>
                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                            </a>
                        </template>
                    </div>
                </template>
            </div>
            <div class="dashboard-header-center">
                <h1 class="dashboard-title">Grand Praetor Dashboard</h1>
                <p class="dashboard-subtitle">Chapter Overview</p>
            </div>
            <div class="dashboard-header-right">
                <template if:true={gpInfo.agpName}>
                    <div class="header-contact-item">
                        <span class="header-contact-label">Assistant Grand Praetor</span>
                        <a onclick={handleContactClick} data-contactid={gpInfo.agpContactId} class="header-contact-link">{gpInfo.agpName}</a>
                        <template if:true={gpInfo.agpEmailLink}>
                            <a href={gpInfo.agpEmailLink} class="header-contact-email" title={gpInfo.agpEmail}>
                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                            </a>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading..." size="large"></lightning-spinner>
                <p class="loading-text">Loading your chapters...</p>
            </div>
        </template>

        <!-- Error -->
        <template if:true={hasError}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" variant="error" size="medium"></lightning-icon>
                <p class="error-message">{errorMessage}</p>
            </div>
        </template>

        <!-- No Chapters -->
        <template if:true={hasNoChapters}>
            <div class="empty-container">
                <lightning-icon icon-name="utility:info" variant="warning" size="medium"></lightning-icon>
                <p class="empty-message">No active Grand Praetor positions found for your account.</p>
            </div>
        </template>

        <!-- Chapter Cards -->
        <template if:true={hasChapters}>
            <div class="chapter-grid">
                <template for:each={dashboardData} for:item="chapter">
                    <div key={chapter.chapterId} class="chapter-card">

                        <!-- Chapter Header -->
                        <div class={chapter.bannerClass}>
                            <div class="chapter-title-row">
                                <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                                <div class="chapter-title-block">
                                    <h2 class="chapter-name">{chapter.chapterName}</h2>
                                    <template if:true={chapter.schoolName}>
                                        <span class="school-name">{chapter.schoolName}</span>
                                    </template>
                                </div>
                            </div>
                            <div class="chapter-header-meta">
                                <template if:true={chapter.formattedFoundingDate}>
                                    <span class="header-meta-item">
                                        <lightning-icon icon-name="utility:date_time" size="xx-small" class="header-meta-icon"></lightning-icon>
                                        Founded: {chapter.formattedFoundingDate}
                                    </span>
                                </template>
                                <template if:true={chapter.chapterAddress}>
                                    <span class="header-meta-item">
                                        <lightning-icon icon-name="utility:location" size="xx-small" class="header-meta-icon"></lightning-icon>
                                        {chapter.chapterAddress}
                                    </span>
                                </template>
                            </div>
                            <div class="chapter-meta">
                                <span class="meta-badge status-active">{chapter.positionStatus}</span>
                                <template if:true={chapter.hasBalance}>
                                    <span class="meta-badge balance-badge">{chapter.formattedBalance} total due</span>
                                </template>
                            </div>
                            <div class="banner-contacts-row">
                                <template if:true={chapter.advisorName}>
                                    <div class="banner-contact-item">
                                        <span class="banner-contact-label">Advisor:</span>
                                        <a onclick={handleContactClick} data-contactid={chapter.advisorContactId} class="banner-contact-link">{chapter.advisorName}</a>
                                        <template if:true={chapter.advisorEmailLink}>
                                            <a href={chapter.advisorEmailLink} class="banner-contact-email" title={chapter.advisorEmail}>
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                                <template if:true={chapter.asstAdvisorName}>
                                    <div class="banner-contact-item">
                                        <span class="banner-contact-label">Asst Advisor:</span>
                                        <a onclick={handleContactClick} data-contactid={chapter.asstAdvisorContactId} class="banner-contact-link">{chapter.asstAdvisorName}</a>
                                        <template if:true={chapter.asstAdvisorEmailLink}>
                                            <a href={chapter.asstAdvisorEmailLink} class="banner-contact-email" title={chapter.asstAdvisorEmail}>
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <template if:true={chapter.hasBalance}>
                                <div class="aging-buckets">
                                    <div class="aging-bucket aging-bucket-0to30 bucket-clickable"
                                         data-chapter={chapter.chapterId}
                                         data-bucket="0-30"
                                         onclick={handleBucketClick}>
                                        <span class="aging-label">0-30 Days</span>
                                        <span class="aging-amount">{chapter.formatted0to30}</span>
                                        <span class="bucket-hint">tap to view</span>
                                    </div>
                                    <div class="aging-bucket aging-bucket-31to60 bucket-clickable"
                                         data-chapter={chapter.chapterId}
                                         data-bucket="31-60"
                                         onclick={handleBucketClick}>
                                        <span class="aging-label">31-60 Days</span>
                                        <span class="aging-amount">{chapter.formatted31to60}</span>
                                        <span class="bucket-hint">tap to view</span>
                                    </div>
                                    <div class="aging-bucket aging-bucket-61to90 bucket-clickable"
                                         data-chapter={chapter.chapterId}
                                         data-bucket="61-90"
                                         onclick={handleBucketClick}>
                                        <span class="aging-label">61-90 Days</span>
                                        <span class="aging-amount">{chapter.formatted61to90}</span>
                                        <span class="bucket-hint">tap to view</span>
                                    </div>
                                    <div class="aging-bucket aging-bucket-90plus bucket-clickable"
                                         data-chapter={chapter.chapterId}
                                         data-bucket="90+"
                                         onclick={handleBucketClick}>
                                        <span class="aging-label">90+ Days</span>
                                        <span class="aging-amount">{chapter.formatted90Plus}</span>
                                        <span class="bucket-hint">tap to view</span>
                                    </div>
                                </div>
                            </template>

                        </div>

                        <!-- ── UNDERGRAD CHAPTER ── -->
                        <template if:false={chapter.isAlumniChapter}>
                            <div class="stats-row stats-five">
                                <div class="stat-box stat-alumni">
                                    <span class="stat-number">{chapter.alumniCount}</span>
                                    <span class="stat-label">Alumni</span>
                                </div>
                                <div class="stat-box stat-undergrad">
                                    <span class="stat-number">{chapter.undergradCount}</span>
                                    <span class="stat-label">Undergrads</span>
                                </div>
                                <div class="stat-box stat-pledge">
                                    <span class="stat-number">{chapter.pledgeCount}</span>
                                    <span class="stat-label">Pledges</span>
                                </div>
                                <div class="stat-box stat-pnm">
                                    <span class="stat-number">{chapter.pnmCount}</span>
                                    <span class="stat-label">PNMs</span>
                                </div>
                                <div class="stat-box stat-associate">
                                    <span class="stat-number">{chapter.associateCount}</span>
                                    <span class="stat-label">Associates</span>
                                </div>
                            </div>

                            <div class="three-col-section">

                                <!-- Officers -->
                                <div class="panel">
                                    <div class="panel-header">
                                        <div class="panel-header-left">
                                            <lightning-icon icon-name="standard:user" size="x-small"></lightning-icon>
                                            <h3 class="panel-title">Chapter Officers</h3>
                                        </div>
                                        <template if:true={chapter.hasOfficerEmails}>
                                            <a href={chapter.officerMailtoLink} class="email-all-btn">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                <span>Email All</span>
                                            </a>
                                        </template>
                                    </div>
                                    <template if:true={chapter.hasOfficers}>
                                        <div class="scroll-list">
                                            <template for:each={chapter.chapterOfficers} for:item="officer">
                                                <div key={officer.positionId} class="list-row">
                                                    <div class="row-info">
                                                        <button
                                                            class="contact-link"
                                                            data-contactid={officer.contactId}
                                                            onclick={handleContactClick}>
                                                            {officer.officerName}
                                                        </button>
                                                        <span class="row-sub red">{officer.role}</span>
                                                        <template if:true={officer.formattedStartDate}>
                                                            <span class="officer-date">In office: {officer.formattedStartDate}</span>
                                                        </template>
                                                        <template if:true={officer.formattedInitDate}>
                                                            <span class="officer-date">Initiated: {officer.formattedInitDate}</span>
                                                        </template>
                                                    </div>
                                                    <template if:true={officer.emailLink}>
                                                        <a href={officer.emailLink} class="row-email-btn" title={officer.email}>
                                                            <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                        </a>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={chapter.hasOfficers}>
                                        <p class="no-data-message">No active officers found.</p>
                                    </template>
                                </div>

                                <!-- Undergrads -->
                                <div class="panel">
                                    <div class="panel-header">
                                        <div class="panel-header-left">
                                            <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                            <h3 class="panel-title">Undergrads</h3>
                                            <span class="panel-count">({chapter.undergradCount})</span>
                                        </div>
                                        <template if:true={chapter.hasUndergradEmails}>
                                            <a href={chapter.undergradMailtoLink} class="email-all-btn">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                <span>Email All</span>
                                            </a>
                                        </template>
                                    </div>
                                    <template if:true={chapter.hasUndergrads}>
                                        <div class="scroll-list">
                                            <template for:each={chapter.activeUndergrads} for:item="member">
                                                <div key={member.memberId} class="list-row">
                                                    <div class="row-info">
                                                        <button
                                                            class="contact-link"
                                                            data-contactid={member.contactId}
                                                            onclick={handleContactClick}>
                                                            {member.memberName}
                                                        </button>
                                                        <template if:true={member.formattedInitDate}>
                                                            <span class="row-sub">Initiated: {member.formattedInitDate}</span>
                                                        </template>
                                                        <template if:false={member.formattedInitDate}>
                                                            <template if:true={member.formattedPledgeDate}>
                                                                <span class="row-sub">Pledged: {member.formattedPledgeDate}</span>
                                                            </template>
                                                        </template>
                                                    </div>
                                                    <template if:true={member.emailLink}>
                                                        <a href={member.emailLink} class="row-email-btn" title={member.email}>
                                                            <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                        </a>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={chapter.hasUndergrads}>
                                        <p class="no-data-message">No active undergrads found.</p>
                                    </template>
                                </div>

                                <!-- Pledges -->
                                <div class="panel">
                                    <div class="panel-header">
                                        <div class="panel-header-left">
                                            <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                            <h3 class="panel-title">Pledges</h3>
                                            <span class="panel-count">({chapter.pledgeCount})</span>
                                        </div>
                                        <template if:true={chapter.hasPledgeEmails}>
                                            <a href={chapter.pledgeMailtoLink} class="email-all-btn">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                <span>Email All</span>
                                            </a>
                                        </template>
                                    </div>
                                    <template if:true={chapter.hasPledges}>
                                        <div class="scroll-list">
                                            <template for:each={chapter.activePledges} for:item="member">
                                                <div key={member.memberId} class="list-row">
                                                    <div class="row-info">
                                                        <button
                                                            class="contact-link"
                                                            data-contactid={member.contactId}
                                                            onclick={handleContactClick}>
                                                            {member.memberName}
                                                        </button>
                                                        <template if:true={member.formattedPledgeDate}>
                                                            <span class="row-sub">Pledged: {member.formattedPledgeDate}</span>
                                                        </template>
                                                    </div>
                                                    <template if:true={member.emailLink}>
                                                        <a href={member.emailLink} class="row-email-btn" title={member.email}>
                                                            <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                        </a>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={chapter.hasPledges}>
                                        <p class="no-data-message">No active pledges found.</p>
                                    </template>
                                </div>

                            </div>
                        </template>

                        <!-- ── ALUMNI / PROVINCE CHAPTER ── -->
                        <template if:true={chapter.isAlumniChapter}>
                            <div class="stats-row stats-one">
                                <div class="stat-box stat-alumni">
                                    <span class="stat-number">{chapter.totalMemberCount}</span>
                                    <span class="stat-label">Members</span>
                                </div>
                            </div>
                            <div class="two-col-section">
                                <div class="panel">
                                    <div class="panel-header">
                                        <div class="panel-header-left">
                                            <lightning-icon icon-name="standard:user" size="x-small"></lightning-icon>
                                            <h3 class="panel-title">Chapter Officers</h3>
                                        </div>
                                        <template if:true={chapter.hasOfficerEmails}>
                                            <a href={chapter.officerMailtoLink} class="email-all-btn">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                <span>Email All</span>
                                            </a>
                                        </template>
                                    </div>
                                    <template if:true={chapter.hasOfficers}>
                                        <div class="scroll-list">
                                            <template for:each={chapter.chapterOfficers} for:item="officer">
                                                <div key={officer.positionId} class="list-row">
                                                    <div class="row-info">
                                                        <button
                                                            class="contact-link"
                                                            data-contactid={officer.contactId}
                                                            onclick={handleContactClick}>
                                                            {officer.officerName}
                                                        </button>
                                                        <span class="row-sub red">{officer.role}</span>
                                                        <template if:true={officer.formattedStartDate}>
                                                            <span class="officer-date">In office: {officer.formattedStartDate}</span>
                                                        </template>
                                                        <template if:true={officer.formattedInitDate}>
                                                            <span class="officer-date">Initiated: {officer.formattedInitDate}</span>
                                                        </template>
                                                    </div>
                                                    <template if:true={officer.emailLink}>
                                                        <a href={officer.emailLink} class="row-email-btn" title={officer.email}>
                                                            <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                        </a>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={chapter.hasOfficers}>
                                        <p class="no-data-message">No active officers found.</p>
                                    </template>
                                </div>

                                <div class="panel">
                                    <div class="panel-header">
                                        <div class="panel-header-left">
                                            <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                            <h3 class="panel-title">Members</h3>
                                            <span class="panel-count">({chapter.totalMemberCount})</span>
                                        </div>
                                        <template if:true={chapter.hasMemberEmails}>
                                            <a href={chapter.memberMailtoLink} class="email-all-btn">
                                                <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                <span>Email All</span>
                                            </a>
                                        </template>
                                    </div>
                                    <template if:true={chapter.hasMembers}>
                                        <div class="scroll-list">
                                            <template for:each={chapter.activeMembers} for:item="member">
                                                <div key={member.memberId} class="list-row">
                                                    <div class="row-info">
                                                        <button
                                                            class="contact-link"
                                                            data-contactid={member.contactId}
                                                            onclick={handleContactClick}>
                                                            {member.memberName}
                                                        </button>
                                                        <template if:true={member.memberType}>
                                                            <span class="row-sub">{member.memberType}</span>
                                                        </template>
                                                    </div>
                                                    <template if:true={member.emailLink}>
                                                        <a href={member.emailLink} class="row-email-btn" title={member.email}>
                                                            <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                                        </a>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={chapter.hasMembers}>
                                        <p class="no-data-message">No active members found.</p>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </div>
                </template>
            </div>
        </template>

        <!-- ── 90+ DAY BALANCE ALERT MODAL ── -->
        <template if:true={showBalanceAlert}>
            <div class="modal-backdrop" onclick={closeBalanceAlert}></div>
            <div class="modal-container alert-modal" role="dialog" aria-modal="true">
                <div class="modal-header alert-header">
                    <div class="modal-header-left">
                        <lightning-icon icon-name="utility:warning" size="small" variant="inverse"></lightning-icon>
                        <h2 class="modal-title">⚠ Action Required — 60+ Days Past Due</h2>
                    </div>
                    <button class="modal-close" onclick={closeBalanceAlert} title="Close">
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="alert-intro">The following chapters have balances that are <strong>60+ days past due</strong>. Please contact them immediately.</p>
                    <div class="alert-chapter-list">
                        <template for:each={alertChapters} for:item="chapter">
                            <div key={chapter.chapterId}
                                 class="alert-chapter-row alert-chapter-clickable"
                                 data-chapter={chapter.chapterId}
                                 data-bucket="90+"
                                 onclick={handleAlertChapterClick}>
                                <div class="alert-chapter-info">
                                    <span class="alert-chapter-name">{chapter.chapterName}</span>
                                    <span class="alert-chapter-school">{chapter.schoolName}</span>
                                    <span class="alert-chapter-status">{chapter.positionStatus}</span>
                                </div>
                                <div class="alert-chapter-balance">
                                    <span class="alert-amount">{chapter.formattedBalance}</span>
                                    <span class="alert-age">{chapter.maxPostedAge} days</span>
                                    <span class="alert-view-hint">tap to view</span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- ── ORDER LINES MODAL ── -->
        <template if:true={showLinesModal}>
            <div class="modal-backdrop" onclick={closeLinesModal}></div>
            <div class="modal-container lines-modal-container" role="dialog" aria-modal="true">
                <div class="modal-header lines-modal-header">
                    <div class="modal-header-left">
                        <lightning-icon icon-name="utility:currency" size="small" variant="inverse"></lightning-icon>
                        <h2 class="modal-title">{linesModalTitle}</h2>
                    </div>
                    <button class="modal-close" onclick={closeLinesModal} title="Close">
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>
                <div class="modal-body lines-modal-body">
                    <template if:true={linesModalLoading}>
                        <div class="modal-loading">
                            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:true={linesModalEmpty}>
                        <p class="no-data-message">No order lines found for this period.</p>
                    </template>
                    <template if:true={linesModalHasLines}>
                        <div class="lines-table-wrap">
                            <table class="lines-table">
                                <thead>
                                    <tr>
                                        <th>Order #</th>
                                        <th>Contact</th>
                                        <th>Item</th>
                                        <th>Posted</th>
                                        <th>Due</th>
                                        <th class="col-right">Qty</th>
                                        <th class="col-right">Total</th>
                                        <th class="col-right">Paid</th>
                                        <th class="col-right">Balance Due</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={linesModalLines} for:item="line">
                                        <tr key={line.lineKey}>
                                            <td class="col-order">{line.salesOrderName}</td>
                                            <td>{line.contactName}</td>
                                            <td>{line.itemName}</td>
                                            <td class="col-date">{line.postedDateFormatted}</td>
                                            <td class="col-date">{line.dueDateFormatted}</td>
                                            <td class="col-right">{line.quantity}</td>
                                            <td class="col-right">{line.totalFormatted}</td>
                                            <td class="col-right col-paid">{line.amountPaidFormatted}</td>
                                            <td class="col-right col-balance">{line.balanceDueFormatted}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ── CONTACT MODAL ── -->
        <template if:true={showModal}>
            <div class="modal-backdrop" onclick={closeModal}></div>
            <div class="modal-container" role="dialog" aria-modal="true">
                <div class="modal-header">
                    <div class="modal-header-left">
                        <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                        <h2 class="modal-title">{modalTitle}</h2>
                    </div>
                    <button class="modal-close" onclick={closeModal} title="Close">
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>

                <div class="modal-body">
                    <template if:true={modalLoading}>
                        <div class="modal-loading">
                            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                        </div>
                    </template>

                    <template if:false={modalLoading}>
                        <template if:true={modalContact}>

                            <!-- Phone -->
                            <template if:true={modalContact.hasPhone}>
                                <div class="modal-row">
                                    <lightning-icon icon-name="utility:phone_portrait" size="x-small" class="modal-icon"></lightning-icon>
                                    <div class="modal-row-content">
                                        <span class="modal-label">Phone</span>
                                        <a href={modalPhoneLink} class="modal-value">{modalContact.displayPhone}</a>
                                    </div>
                                </div>
                            </template>

                            <!-- Mobile (if different from phone) -->
                            <template if:true={modalContact.showMobile}>
                                <div class="modal-row">
                                    <lightning-icon icon-name="utility:phone_portrait" size="x-small" class="modal-icon"></lightning-icon>
                                    <div class="modal-row-content">
                                        <span class="modal-label">Mobile</span>
                                        <a href={modalMobileLink} class="modal-value">{modalContact.mobilePhone}</a>
                                    </div>
                                </div>
                            </template>

                            <!-- Email -->
                            <template if:true={modalContact.hasEmail}>
                                <div class="modal-row">
                                    <lightning-icon icon-name="utility:email" size="x-small" class="modal-icon"></lightning-icon>
                                    <div class="modal-row-content">
                                        <span class="modal-label">Email</span>
                                        <a href={modalEmailLink} class="modal-value">{modalContact.displayEmail}</a>
                                    </div>
                                </div>
                            </template>

                            <!-- Address -->
                            <template if:true={modalContact.hasAddress}>
                                <div class="modal-row">
                                    <lightning-icon icon-name="utility:location" size="x-small" class="modal-icon"></lightning-icon>
                                    <div class="modal-row-content">
                                        <span class="modal-label">Address</span>
                                        <span class="modal-value">{modalContact.address}</span>
                                    </div>
                                </div>
                            </template>

                            <!-- No data -->
                            <template if:false={modalContact.hasPhone}>
                                <template if:false={modalContact.hasEmail}>
                                    <template if:false={modalContact.hasAddress}>
                                        <p class="no-data-message">No contact details available.</p>
                                    </template>
                                </template>
                            </template>

                        </template>
                        <template if:false={modalContact}>
                            <p class="no-data-message">Could not load contact details.</p>
                        </template>
                    </template>
                </div>
            </div>
        </template>

    </div>
</template>
